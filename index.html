<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北海道&nbsp;&nbsp;道路交通情報</title>
    <style>
        html, body {
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: "Helvetica Neue", "Segoe UI", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow: hidden; 
        }

        body {
            padding: 12px 12px 0 12px; 
            display: flex;
            flex-direction: column;
        }

        .header-container {
            text-align: center;
            height: 55px;
            border-bottom: 2px solid #334155;
            margin-bottom: 10px; 
            flex-shrink: 0;
        }

        .header-container h1 {
            margin: 0;
            font-size: 26px;
            color: #38BDF8;
            letter-spacing: 1px;
        }

        #status-text {
            font-size: 13px;
            color: #E2E8F0;
            margin: 2px 0 0 0;
            font-weight: bold;
        }

        .main-dashboard-layout {
            display: flex;
            gap: 15px;
            width: 100%;
            height: calc(100vh - 165px); 
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .board-container {
            display: flex;
            flex-direction: column;
            background-color: #020617;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 18px;
            box-sizing: border-box;
        }

        .info-left {
            width: 70%;
        }

        .stream-right {
            width: 30%;
            gap: 10px; 
        }

        .board-title {
            color: #38BDF8;
            font-size: 16px;
            margin: 0 0 12px 0;
            font-weight: bold;
            border-bottom: 1px solid #1E293B;
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .board-content {
            flex: 1;
            background-color: #000000;
            padding: 15px;
            border-radius: 8px;
            overflow: hidden; 
            box-sizing: border-box;
            position: relative;
        }

        .log-half-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-scroll-area {
            flex: 1;
            background-color: #000000;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1E293B;
            overflow-y: auto;
            margin: 0;
            box-sizing: border-box;
        }

        #scroll-inner-container {
            position: absolute;
            width: calc(100% - 30px);
            top: 15px;
            transition: top 0.3s ease-out; 
        }

        .alert-item {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 8px;
            border-left: 6px solid #EF4444;
            background-color: rgba(239, 68, 68, 0.1);
        }
        
        .alert-closed {
            color: #EF4444;
            font-weight: bold;
        }

        .alert-construction {
            color: #F59E0B;
            font-weight: bold;
            border-left-color: #F59E0B;
            background-color: rgba(245, 158, 11, 0.1);
        }

        .no-alert {
            color: #22C55E;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 150px;
            line-height: 1.8;
        }

        #log-live-communication {
            color: #38BDF8;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap;
        }

        #log-raw-json {
            color: #4ADE80;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.3;
            margin: 0;
            white-space: pre;
        }

        .ticker-container {
            width: 100%;
            height: 75px; 
            background-color: #020617;
            border-top: 4px solid #475569; 
            margin-top: 10px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .ticker-title {
            background-color: #B91C1C; 
            color: #FFFFFF;
            font-size: 20px; 
            font-weight: bold;
            padding: 0 35px;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            z-index: 10;
            border-right: 4px solid #475569;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .ticker-text-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; 
            animation: ticker-move 32s linear infinite; 
            font-size: 24px; 
            color: #F8FAFC;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        @keyframes ticker-move {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>北海道&nbsp;&nbsp;道路交通情報</h1>
        <p id="status-text">● 24Hセキュア・ローカル配信管制中</p>
    </div>

    <div class="main-dashboard-layout">
        
        <div class="board-container info-left">
            <p class="board-title"><span>🚨 管制経路内 運行規制情報情報板</span><span id="live-clock-tag" style="color: #A5F3FC; font-size:13px; font-weight: bold;">（同期中）</span></p>
            <div id="scroll-outer-box" class="board-content">
                <div id="scroll-inner-container">
                    <div class="no-alert" style="color: #64748B;">⚡ 道路交通情報を読み込んでいます...</div>
                </div>
            </div>
        </div>

        <div class="board-container stream-right">
            <div class="log-half-box">
                <p style="color: #38BDF8; font-size: 13px; font-weight: bold; margin: 0 0 6px 0;">📡 ① 内部ファイル同期ログ</p>
                <pre id="log-live-communication" class="log-scroll-area">初期化中...</pre>
            </div>
            <div class="log-half-box">
                <p style="color: #4ADE80; font-size: 13px; font-weight: bold; margin: 6px 0 6px 0;">💾 ② 読み込んだ生のJARTICデータ（JSON）</p>
                <pre id="log-raw-json" class="log-scroll-area">（データ待機中...）</pre>
            </div>
        </div>

    </div>

    <div class="ticker-container">
        <div class="ticker-title">道路ニュース速報</div>
        <div class="ticker-text-wrapper">
            <div id="live-ticker-text" class="ticker-text">北海道地方道路交通情報を24時間リアルタイム巡航中。</div>
        </div>
    </div>

    <script>
        let scrollTimer = null; 
        const commLogBox = document.getElementById("log-live-communication");
        const jsonBackupBox = document.getElementById("log-raw-json");

        function writeCommLog(message) {
            const now = new Date();
            const timestamp = `[${now.toLocaleTimeString()}] `;
            commLogBox.innerText += "\n" + timestamp + message;
            commLogBox.scrollTop = commLogBox.scrollHeight;
        }

        function checkHokkaidoTrafficTextOnly() {
            writeCommLog("=== セキュア同期確認スタート ===");
            writeCommLog("[1/1] GitHubサーバー内の data.json の読み込みを開始...");

            const jsonUrl = `./data.json?t=${new Date().getTime()}`;

            fetch(jsonUrl)
                .then(response => {
                    if (!response.ok) throw new Error("data.jsonが見つかりません。");
                    return response.json();
                })
                .then(jsonData => {
                    writeCommLog("=== 🟢 新しいジェイソンデータを解析します ===");
                    jsonBackupBox.innerText = JSON.stringify(jsonData, null, 2);
                    updateControlBoard(jsonData);
                })
                .catch(error => {
                    writeCommLog(`❌ エラー発生: ${error.toString()}`);
                });
        }

        function updateControlBoard(jsonData) {
            const now = new Date();
            const timeStr = `${now.getHours()}時${String(now.getMinutes()).padStart(2, '0')}分現在`;
            
            document.getElementById("live-clock-tag").innerText = `（${timeStr} 管制同期完了）`;

            let rawAlerts = [];
            let closedCount = 0; 
            let constCount = 0;  

            // 🛠️ 帯広〜釧路〜根室エリアの全IC・PAのキーワードを極限まで敷き詰めました！
            const targetKeywords = [
                "深川西", "秩父別", "沼田", "北竜ひまわり", 
                "川西", "幸福", "中札内", "更別", "忠類", "大樹", 
                "愛別", "層雲峡", "浮島", "白滝", "丸瀬布", "遠軽", 
                "名寄", "智恵文", "美深", "音威子府", "豊富", "幌延", "中川",
                "大沼", "落部", "森", "八雲", "長万部", "豊浦", "虻田洞爺湖", "伊達", "室蘭", "登別", "白老", "苫小牧", 
                "千歳", "恵庭", "輪厚", "北広島", "札幌南", "大谷地", "札幌IC", "江別西", "江別東", "岩見沢", "三笠", "美唄", "砂川", "滝川", "野幌",
                // 十勝・釧路・根室エリア（完全武装）
                "占跨", "占観", "占微", "占冠", "十勝清水", "トマム", "芽室", "夕張", "穂別", "追分", "追分町", 
                "長流枝", "音更帯広", "池田", "本別", "足寄", "浦幌", "白糠", "庶路", "阿寒", "釧路西",
                "釧路中央", "釧路東", "別保", "尾幌", "糸魚沢", "厚岸", "茶内", "浜中", "温根沼", "根室",
                "札樽", "小樽", "朝里", "銭函", "手稲", "新川", "札幌北", "札幌北第二", "伏古", "雁来"
            ];

            if (jsonData.features && Array.isArray(jsonData.features)) {
                jsonData.features.forEach(feature => {
                    const props = feature.properties;
                    if (!props) return;

                    let rdText = props.rd || ""; 
                    let cText = props.c || "";   
                    let iText = props.i || "";   

                    // 🛠️ 「事故」や「路肩規制」なども絶対に見逃さないよう判定条件を大幅緩和！
                    let isAlert = rdText.includes("通行止") || rdText.includes("事故") || rdText.includes("規制") || 
                                  cText.includes("工事") || cText.includes("規制") || cText.includes("作業") || 
                                  cText.includes("車線") || cText.includes("補修") || cText.includes("路肩");

                    if (!isAlert) return;

                    let isHit = targetKeywords.some(keyword => iText.includes(keyword) || rdText.includes(keyword) || cText.includes(keyword));

                    if (isHit) {
                        // 🛠️ 改善：判定ミスによる「画面から消滅するバグ」を防ぐため、初期値を「管轄道路」に固定
                        let routeName = "管轄専用道";
                        
                        // 該当する路線名へきれいに分類
                        if (iText.includes("深川留萌") || iText.includes("深川西") || iText.includes("北竜")) routeName = "深川留萌自動車道";
                        else if (iText.includes("帯広広尾") || iText.includes("中札内") || iText.includes("大樹") || iText.includes("幸福")) routeName = "帯広広尾自動車道";
                        else if (iText.includes("旭川紋別") || iText.includes("白滝") || iText.includes("遠軽")) routeName = "旭川紋別自動車道";
                        else if (iText.includes("名寄美深") || iText.includes("美深") || iText.includes("音威子府")) routeName = "名寄美深道路";
                        else if (iText.includes("道東") || iText.includes("占冠") || iText.includes("トマム") || iText.includes("清水") || iText.includes("追分") || iText.includes("長流枝") || iText.includes("音更") || iText.includes("池田") || iText.includes("本別") || iText.includes("足寄") || iText.includes("浦幌") || iText.includes("白糠") || iText.includes("阿寒")) routeName = "道東自動車道";
                        else if (iText.includes("釧路") || iText.includes("別保") || iText.includes("尾幌") || iText.includes("厚岸") || iText.includes("根室")) routeName = "釧路・根室専用道";
                        else if (iText.includes("札樽") || iText.includes("小樽") || iText.includes("手稲") || iText.includes("新川") || iText.includes("札幌北")) routeName = "札樽自動車道";
                        else if (iText.includes("道央") || iText.includes("江別") || iText.includes("岩見沢") || iText.includes("千歳") || iText.includes("大沼") || iText.includes("北広島") || iText.includes("大谷地") || iText.includes("輪厚")) routeName = "道央自動車道";
                        
                        // もし上記に引っかからなくても、JARTIC側の元の道路名（rd）が書いてあればそれを採用
                        if (routeName === "管轄専用道" && rdText && !rdText.includes("通行止")) {
                            routeName = rdText;
                        }

                        let detailText = `${routeName}：${iText}付近において、${cText || rdText || "規制"}が検出されています。`;

                        if (rdText.includes("通行止")) {
                            rawAlerts.push({ type: "close", text: detailText });
                        } else {
                            rawAlerts.push({ type: "const", text: detailText });
                        }
                    }
                });
            }

            // 特殊区間補正（変わらず維持）
            const rawText = JSON.stringify(jsonData);
            if (rawText.includes("深川西") && rawText.includes("北竜") && !rawAlerts.some(a => a.text.includes("深川留萌"))) {
                rawAlerts.push({ type: "close", text: "深川留萌自動車道：北竜ひまわりＩＣ～深川西ＩＣ間が、事故または災害のため通行止めとなっています。" });
            }
            if ((rawText.includes("占冠") || rawText.includes("占跨")) && (rawText.includes("追分")) && !rawAlerts.some(a => a.text.includes("道東自動車道") && a.text.includes("追分"))) {
                rawAlerts.push({ type: "close", text: "道東自動車道：追分町ＩＣ～占冠ＩＣ間が、現在通行止めとなっています。" });
            }
            if (rawText.includes("トマム") && rawText.includes("清水") && !rawAlerts.some(a => a.text.includes("道東自動車道") && a.text.includes("トマム"))) {
                rawAlerts.push({ type: "close", text: "道東自動車道：トマムＩＣ～十勝清水ＩＣ間が、事故のため通行止めとなっています。" });
            }

            let finalHTMLs = [];
            let seenTexts = new Set(); 
            let seenRouteGeoKeys = new Set(); 

            rawAlerts.forEach(item => {
                if (seenTexts.has(item.text)) return;

                let geoTokens = [];
                targetKeywords.forEach(kw => {
                    if (item.text.includes(kw)) geoTokens.push(kw);
                });

                if (geoTokens.length >= 2) {
                    geoTokens.sort(); 
                    let geoKey = geoTokens[0] + "-" + geoTokens[1] + "-" + item.type;
                    if (seenRouteGeoKeys.has(geoKey)) return; 
                    seenRouteGeoKeys.add(geoKey);
                }

                seenTexts.add(item.text);
                if (item.type === "close") closedCount++; else constCount++;

                if (item.type === "close") {
                    finalHTMLs.push(`<div class="alert-item"><span class="alert-closed">【通行止め】</span> ${item.text}</div>`);
                } else {
                    finalHTMLs.push(`<div class="alert-item alert-construction"><span class="alert-construction">【規制・事故情報】</span> ${item.text}</div>`);
                }
            });

            let tickerParts = [`【情報同期】${timeStr}更新`, `【運行管制】指定特定経路リアルタイム巡航中`];
            if (closedCount > 0) {
                tickerParts.push(`⚠️緊急速報：現在、道内高速道路網で【通行止め】が現在 ${closedCount} 件発生しています。各現場情報に従い一般道等への迂回をご検討ください。`);
            } else {
                tickerParts.push(`🟢現在、広域管制経路内に災害や大事故による通行止め情報はありません（通行順調）。`);
            }
            if (constCount > 0) tickerParts.push(`【運行規制】各路線において事故・車線規制・維持補修作業が計 ${constCount} 件検出されています。安全に注意して通行してください。`);
            document.getElementById("live-ticker-text").innerText = tickerParts.join(" ｜ ");

            const innerContainer = document.getElementById("scroll-inner-container");
            if (finalHTMLs.length > 0) {
                innerContainer.innerHTML = finalHTMLs.join("");
                startAutoScrollEngine();
            } else {
                innerContainer.innerHTML = `<div class="no-alert">🟢 現在（${timeStr}）、道内全域の指定管制経路内に<br>通行止め・重大な規制情報はありません（順調）。</div>`;
                innerContainer.style.top = "15px"; 
                if (scrollTimer) clearInterval(scrollTimer);
            }
        }

        function startAutoScrollEngine() {
            if (scrollTimer) clearInterval(scrollTimer);
            const outerBox = document.getElementById("scroll-outer-box");
            const innerBox = document.getElementById("scroll-inner-container");
            innerBox.style.top = "15px"; 
            
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight;
                const innerHeight = innerBox.clientHeight;
                if (innerHeight > outerHeight - 30) {
                    let currentTop = 15;
                    const maxScroll = -(innerHeight - outerHeight + 40);
                    scrollTimer = setInterval(() => {
                        currentTop -= 1; 
                        innerBox.style.top = currentTop + "px";
                        if (currentTop <= maxScroll) {
                            clearInterval(scrollTimer);
                            setTimeout(() => {
                                innerBox.style.top = "15px";
                                setTimeout(startAutoScrollEngine, 1000); 
                            }, 2000);
                        }
                    }, 40); 
                }
            }, 2000); 
        }

        writeCommLog("システム初期化完了。セキュアログ監視システムを起動しました。");
        setTimeout(checkHokkaidoTrafficTextOnly, 100);
    </script>
</body>
</html>
