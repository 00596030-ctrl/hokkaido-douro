<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>道路交通情報センター</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        body {
            padding: 25px 25px 0 25px; 
            display: flex;
            flex-direction: column;
        }

        /* 横並び型のデザインヘッダー */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #334155;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .title-area { 
            display: flex; 
            align-items: center; 
        }
        
        /* 専用オレンジバッジ */
        .logo-badge {
            background-color: #f97316;
            color: #0f172a;
            padding: 10px 24px;
            font-weight: 900;
            font-size: 32pt;
            border-radius: 8px;
            margin-right: 25px;
            letter-spacing: 2px;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
        }
        
        h1 { 
            font-size: 32pt; 
            letter-spacing: 1px; 
            font-weight: bold; 
            color: #F8FAFC;
        }

        /* 右上の更新时间エリア */
        .header-time-area {
            font-size: 16pt; 
            color: #94a3b8; 
            text-align: right;
        }
        .header-sub-text {
            font-size: 11pt; 
            margin-top: 4px; 
            color: #475569;
            font-weight: bold;
        }

        /* メインレイアウト */
        .main-dashboard-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            flex-grow: 1; 
            margin-bottom: 15px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .board-container {
            flex: 1; 
            display: flex;
            flex-direction: column;
            background-color: #1e293b; 
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            overflow: hidden;
        }

        .info-left { border-top: 6px solid #EF4444; }
        .info-right { border-top: 6px solid #F59E0B; }

        .board-title {
            font-size: 22px;
            margin: 0 0 15px 0;
            font-weight: bold;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .left-title { color: #FCA5A5; }
        .right-title { color: #FDE047; }

        .board-content-wrapper {
            flex: 1;
            background-color: #000000;
            border-radius: 8px;
            padding: 15px;
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
        }

        .scroll-inner-container {
            position: absolute;
            width: calc(100% - 30px);
            top: 15px;
            transition: top 0.5s ease-in-out; 
        }

        /* 重大障害：はみ出し防止用の3行制限を追加 */
        .alert-item-red {
            font-size: 24px; 
            line-height: 1.5;
            margin-bottom: 16px;
            padding: 14px 20px 14px 45px; 
            text-indent: -25px; 
            border-radius: 8px;
            background-color: #191010; 
            color: #F8FAFC;
            border: 1px solid #3A1E1E;
            border-left: 8px solid #EF4444;
            
            /* 3行以上になったら自動で「...」にする設定 */
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3; 
            overflow: hidden;
            max-height: 140px; /* 1マスの最大高さを固定化して見切れを完璧に防ぐ */
        }
        
        .alert-closed-tag {
            color: #F87171;
            font-weight: bold;
        }

        /* 工事規制：同じく3行制限を追加 */
        .alert-item-yellow {
            font-size: 21px;
            line-height: 1.5;
            margin-bottom: 14px;
            padding: 12px 20px 12px 45px; 
            text-indent: -25px;
            border-radius: 8px;
            background-color: #1A1710; 
            color: #F8FAFC;
            border: 1px solid #3A321E;
            border-left: 6px solid #F59E0B;

            /* 3行以上になったら自動で「...」にする設定 */
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3; 
            overflow: hidden;
            max-height: 125px;
        }

        .alert-const-tag {
            color: #FBBF24;
            font-weight: bold;
        }

        .no-alert {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-top: 140px;
            line-height: 1.8;
            width: 100%;
        }
        .no-alert-green { color: #22C55E; }
        .no-alert-gray { color: #64748B; }

        /* ニューステロップ */
        .ticker-container {
            width: 100%;
            height: 60px; 
            background-color: #020617;
            border-top: 4px solid #475569; 
            overflow: hidden;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .ticker-title {
            background-color: #334155; 
            color: #FFFFFF;
            font-size: 18px; 
            font-weight: bold;
            padding: 0 30px;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            z-index: 10;
            border-right: 4px solid #475569;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .ticker-text-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; 
            animation: ticker-move 32s linear infinite; 
            font-size: 22px; 
            color: #F8FAFC;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        @keyframes ticker-move {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <div class="logo-badge">道内</div>
            <h1>道路交通情報</h1>
        </div>
        <div class="header-time-area">
            <div>情報更新: <span id="update-time-text">-時-分現在</span></div>
            <div class="header-sub-text">24H広域道路運行管制システム</div>
        </div>
    </header>

    <div class="main-dashboard-layout">
        
        <div class="board-container info-left">
            <p class="board-title left-title"><span>重大障害・通行止め・事故情報</span><span id="left-clock-tag" style="color: #FCA5A5; font-size:14px; font-weight:normal;">（同期中）</span></p>
            <div class="board-content-wrapper" id="left-outer-box">
                <div class="scroll-inner-container" id="left-inner-container">
                    <div class="no-alert no-alert-gray">管制データを読み込んでいます...</div>
                </div>
            </div>
        </div>

        <div class="board-container info-right">
            <p class="board-title right-title"><span>路線内 工事・車線規制・維持作業</span><span id="right-clock-tag" style="color: #FDE047; font-size:14px; font-weight:normal;">（同期中）</span></p>
            <div class="board-content-wrapper" id="right-outer-box">
                <div class="scroll-inner-container" id="right-inner-container">
                    <div class="no-alert no-alert-gray">管制データを読み込んでいます...</div>
                </div>
            </div>
        </div>

    </div>

    <div class="ticker-container">
        <div class="ticker-title">道路ニュース速報</div>
        <div class="ticker-text-wrapper">
            <div id="live-ticker-text" class="ticker-text"></div>
        </div>
    </div>

    <script>
        // グローバルタイマー管理用オブジェクト
        let pageTimers = { left: null, right: null };

        function checkHokkaidoTrafficTextOnly() {
            const jsonUrl = `./data.json?t=${new Date().getTime()}`;

            fetch(jsonUrl)
                .then(response => {
                    if (!response.ok) throw new Error("data.jsonが見つかりません。");
                    return response.json();
                })
                .then(jsonData => {
                    updateControlBoard(jsonData);
                })
                .catch(error => {
                    console.error("データ同期エラー:", error);
                });
        }

        function updateControlBoard(jsonData) {
            const now = new Date();
            const timeStr = `${now.getHours()}時${String(now.getMinutes()).padStart(2, '0')}分現在`;
            
            document.getElementById("update-time-text").innerText = timeStr;
            document.getElementById("left-clock-tag").innerText = `[データ同期完了]`;
            document.getElementById("right-clock-tag").innerText = `[データ同期完了]`;

            let redAlerts = [];   
            let yellowAlerts = [];
            let closedCount = 0; 
            let constCount = 0;  

            const targetKeywords = [
                "大沼", "落部", "森", "八雲", "長万部", "豊浦", "虻田" , "有珠山", "伊達", "室蘭", "登別", "白老", "苫小牧", "苫東", 
                "千歳", "恵庭", "輪厚", "北広島", "札幌", "江別", "岩見沢", "三笠", "美唄", "砂川", "滝川", "野幌",
                "七饭藤城", "黒岩", "国縫", "静狩", "礼文", "北吉原", "竹浦", "萩野", "錦岡", "新千歳空港", "美沢", "祝梅", "茶志内", 
                "奈井江", "江部乙", "深川", "音江連山", "旭川", "比布", "和寒", "士別剣淵", "道央",
                "札樽", "小樽", "朝里", "銭函", "手稲", "新川", "伏古", "雁来", "張碓", "金山",
                "占跨", "占観", "占微", "占冠", "十勝清水", "トマム", "芽室", "夕張", "穂別", "安排", "由仁", "むかわ", "十勝平原", "長流枝", "音更帯広", "池田", "本別", "足寄", "浦幌", "白糠", "庶路", "阿寒", "キウス", "釧路", "大楽毛",
                "深川西", "秩父別", "沼田", "北竜", "留萌", "幌糠",
                "愛別", "層雲峡", "浮島", "白滝", "丸瀬布", "遠軽",
                "沼ノ端", "厚真", "鵡川", "汐見", "富川", "日高", "門別", "厚賀",
                "川西", "幸福", "中札内", "更別", "忠類", "大樹", 
                "名寄", "智恵文", "美深", "音威子府", "豊富", "幌延", "中川",
                "別保", "尾幌", "糸鱼沢", "厚岸", "茶内", "浜中", "温根沼", "根室",
                "陸別", "置户", "訓子府", "北見", "女満別", "美幌", "高野", "端野",
                "スマート", "流出", "スマートＩＣ", "スマートIC", "砂川スマート", 
                "ＢＳ", "BS", "バスストップ", "停留所", "栗沢", "樽前"
            ];

            if (jsonData.features && Array.isArray(jsonData.features)) {
                jsonData.features.forEach(feature => {
                    const props = feature.properties;
                    if (!props) return;

                    let rdText = (props.rd || "").toString().trim();
                    let cText = (props.c || "").toString().trim();   
                    let iText = (props.i || "").toString().trim();   
                    let nText = (props.n || "").toString().trim();   

                    if (iText.includes("日高門別") && iText.includes("日高厚賀")) return;
                    if (iText.includes("千歳恵庭") && (cText.includes("事故") || rdText.includes("事故"))) return;
                    if (iText.includes("豊浦") && (cText.includes("障害") || rdText.includes("障害"))) return;

                    let routeName = "管轄専用道";
                    let fullTextForRoute = iText + nText + rdText + cText;

                    let isHit = targetKeywords.some(keyword => iText.includes(keyword) || rdText.includes(keyword) || cText.includes(keyword) || nText.includes(keyword));

                    if (isHit || iText.includes("樽前") || nText.includes("樽前")) {
                        
                        if (fullTextForRoute.includes("札樽") || fullTextForRoute.includes("小樽")) routeName = "札樽自動車道";
                        else if (fullTextForRoute.includes("道東") || fullTextForRoute.includes("占冠") || fullTextForRoute.includes("トマム") || fullTextForRoute.includes("清水") || fullTextForRoute.includes("訓子府")) routeName = "道東自動車道";
                        else if (fullTextForRoute.includes("深川留萌") || fullTextForRoute.includes("深川西") || fullTextForRoute.includes("留萌")) routeName = "深川留萌自動車道";
                        else if (fullTextForRoute.includes("旭川紋別") || fullTextForRoute.includes("白滝") || fullTextForRoute.includes("遠軽")) routeName = "旭川紋別自動車道";
                        else if (fullTextForRoute.includes("日高") || fullTextForRoute.includes("門別")) routeName = "日高自動車道";
                        else if (fullTextForRoute.includes("帯広広尾") || fullTextForRoute.includes("中札内")) routeName = "帯広広尾自動車道";
                        else if (fullTextForRoute.includes("名寄美深")) routeName = "名寄美深道路";
                        else if (fullTextForRoute.includes("釧路") || fullTextForRoute.includes("根室")) routeName = "釧路・根室専用道";
                        else if (fullTextForRoute.includes("オホーツク") || fullTextForRoute.includes("北見") || fullTextForRoute.includes("美幌") || fullTextForRoute.includes("女満別") || fullTextForRoute.includes("高野") || fullTextForRoute.includes("端野")) routeName = "美幌バイパス・美幌網走道";
                        else if (fullTextForRoute.includes("道央") || fullTextForRoute.includes("江別") || fullTextForRoute.includes("岩見沢") || fullTextForRoute.includes("三笠") || fullTextForRoute.includes("千歳") || fullTextForRoute.includes("苫小牧") || fullTextForRoute.includes("旭川") || fullTextForRoute.includes("室蘭") || fullTextForRoute.includes("樽前") || fullTextForRoute.includes("野幌") || fullTextForRoute.includes("砂川") || fullTextForRoute.includes("栗沢")) routeName = "道央自動車道";
                        
                        if (routeName === "管轄専用道" && rdText && !rdText.includes("通行止")) {
                            routeName = rdText;
                        }

                        let displayLocation = iText || nText || "管轄区間";
                        if (displayLocation.endsWith("付近")) {
                            displayLocation = displayLocation.slice(0, -2);
                        }

                        let actualStatusText = cText || rdText || "運行規制中";
                        let detailText = `${routeName}：${displayLocation}付近において、${actualStatusText}が検出されています。`;
                        detailText = detailText.replace("規制なし：", "");

                        if (redAlerts.some(a => a.text === detailText) || yellowAlerts.some(a => a.text === detailText)) {
                            return; 
                        }

                        if (fullTextForRoute.includes("通行止") || fullTextForRoute.includes("事故") || fullTextForRoute.includes("障害")) {
                            let typeTag = "【通行止め】";
                            if (fullTextForRoute.includes("事故")) typeTag = "【事故発生】";
                            else if (fullTextForRoute.includes("障害")) typeTag = "【路上障害】";
                            
                            redAlerts.push({ text: detailText, tag: typeTag });
                        } else {
                            yellowAlerts.push({ text: detailText });
                        }
                    }
                });
            }

            let finalRedHTMLs = []; let finalYellowHTMLs = [];
            let seenTexts = new Set();

            redAlerts.forEach(item => {
                if (seenTexts.has(item.text)) return;
                seenTexts.add(item.text); closedCount++;
                finalRedHTMLs.push(`<div class="alert-item-red"><span class="alert-closed-tag">${item.tag}</span> ${item.text}</div>`);
            });

            yellowAlerts.forEach(item => {
                if (seenTexts.has(item.text)) return;
                seenTexts.add(item.text); constCount++;
                finalYellowHTMLs.push(`<div class="alert-item-yellow"><span class="alert-const-tag">【規制・工事】</span> ${item.text}</div>`);
            });

            // 左側（重大障害）
            const leftInner = document.getElementById("left-inner-container");
            if (pageTimers.left) clearTimeout(pageTimers.left);
            if (finalRedHTMLs.length === 0) {
                leftInner.innerHTML = `<div class="no-alert no-alert-green">現在、重要路線内に<br>通行止め等の重大障害はありません。</div>`;
                leftInner.style.top = "15px";
            } else { 
                leftInner.innerHTML = finalRedHTMLs.join(""); 
                setTimeout(() => startPageControl("left"), 100); 
            }

            // 右側（工事規制）
            const rightInner = document.getElementById("right-inner-container");
            if (pageTimers.right) clearTimeout(pageTimers.right);
            if (finalYellowHTMLs.length === 0) {
                innerBox = document.getElementById("right-inner-container"); //バグ修正用安全策
                rightInner.innerHTML = `<div class="no-alert no-alert-green">現在、重要路線内に<br>工事・車線規制情報はありません。</div>`;
                rightInner.style.top = "15px";
            } else { 
                rightInner.innerHTML = finalYellowHTMLs.join(""); 
                setTimeout(() => startPageControl("right"), 100); 
            }

            // テロップ更新
            let tickerParts = [`情報同期：${timeStr}更新`, `運行管制：指定特定経路リアルタイム巡航中`];
            if (closedCount > 0) { tickerParts.push(`緊急速報：管轄路線内で【通行止め・事故】が現在 ${closedCount} 件発生しています。`); } 
            else { tickerParts.push("現在、管轄路線内に通行止めや重大事故情報はありません。"); }
            if (constCount > 0) tickerParts.push(`【運行規制】各路線で車線規制・維持補修作業を計 ${constCount} 件検出。`);
            document.getElementById("live-ticker-text").innerText = tickerParts.join(" ｜ ");
        }

        // ページ切り替え制御システム（見切れ＆はみ出し防止版）
        function startPageControl(side) {
            if (pageTimers[side]) clearTimeout(pageTimers[side]);

            const outerBox = document.getElementById(`${side}-outer-box`);
            const innerBox = document.getElementById(`${side}-inner-container`);
            
            innerBox.style.top = "15px";
            
            let currentPage = 0;
            const viewHeight = outerBox.clientHeight - 30; 
            const items = innerBox.children;
            
            let pageTopPositions = [0]; 
            let currentHeightSum = 0;

            for (let i = 0; i < items.length; i++) {
                currentHeightSum += items[i].offsetHeight + 16; 

                if (currentHeightSum > viewHeight) {
                    pageTopPositions.push(items[i].offsetTop); 
                    currentHeightSum = items[i].offsetHeight + 16; 
                }
            }
            
            function nextPage() {
                if (pageTopPositions.length <= 1) return;

                currentPage++;
                if (currentPage >= pageTopPositions.length) {
                    currentPage = 0;
                }
                
                innerBox.style.top = `-${pageTopPositions[currentPage] - 15}px`;

                pageTimers[side] = setTimeout(nextPage, 5000);
            }

            if (pageTopPositions.length > 1) {
                pageTimers[side] = setTimeout(nextPage, 5000);
            }
        }

        // 1分ごとにデータを再読み込み
        setInterval(checkHokkaidoTrafficTextOnly, 60000); 
        setTimeout(checkHokkaidoTrafficTextOnly, 100);
    </script>
</body>
</html>
