<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北海道&nbsp;&nbsp;道路交通情報</title>
    <style>
        html, body {
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: "Helvetica Neue", "Segoe UI", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow: hidden; 
        }

        body {
            padding: 12px 12px 0 12px; 
            display: flex;
            flex-direction: column;
        }

        .header-container {
            text-align: center;
            height: 55px;
            border-bottom: 2px solid #334155;
            margin-bottom: 10px; 
            flex-shrink: 0;
        }

        .header-container h1 {
            margin: 0;
            font-size: 28px;
            color: #38BDF8;
            letter-spacing: 2px;
        }

        #status-text {
            font-size: 13px;
            color: #94A3B8;
            margin: 2px 0 0 0;
            font-weight: bold;
        }

        .main-dashboard-layout {
            display: flex;
            gap: 15px;
            width: 100%;
            height: calc(100vh - 165px); 
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .board-container {
            flex: 1; 
            display: flex;
            flex-direction: column;
            background-color: #020617;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 18px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .info-left { border-color: #EF4444; }
        .info-right { border-color: #F59E0B; }

        .board-title {
            font-size: 18px;
            margin: 0 0 12px 0;
            font-weight: bold;
            border-bottom: 2px solid #1E293B;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .left-title { color: #FCA5A5; }
        .right-title { color: #FDE047; }

        .board-content-wrapper {
            flex: 1;
            background-color: #000000;
            border-radius: 8px;
            padding: 15px;
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
        }

        .scroll-inner-container {
            position: absolute;
            width: calc(100% - 30px);
            top: 15px;
            transition: top 0.3s ease-out; 
        }

        .alert-item-red {
            font-size: 20px; 
            line-height: 1.6;
            margin-bottom: 14px;
            padding: 16px 20px;
            border-radius: 8px;
            border-left: 8px solid #EF4444;
            background-color: rgba(239, 68, 68, 0.15);
            color: #FCA5A5;
        }
        
        .alert-closed-tag {
            color: #EF4444;
            font-weight: bold;
        }

        .alert-item-yellow {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 14px 18px;
            border-radius: 8px;
            border-left: 6px solid #F59E0B;
            background-color: rgba(245, 158, 11, 0.1);
            color: #FDE047;
        }

        .alert-const-tag {
            color: #F59E0B;
            font-weight: bold;
        }

        .no-alert {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 140px;
            line-height: 1.8;
            width: 100%;
        }
        .no-alert-green { color: #22C55E; }
        .no-alert-gray { color: #64748B; }

        .ticker-container {
            width: 100%;
            height: 75px; 
            background-color: #020617;
            border-top: 4px solid #475569; 
            margin-top: 10px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .ticker-title {
            background-color: #B91C1C; 
            color: #FFFFFF;
            font-size: 20px; 
            font-weight: bold;
            padding: 0 35px;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            z-index: 10;
            border-right: 4px solid #475569;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .ticker-text-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; 
            animation: ticker-move 32s linear infinite; 
            font-size: 24px; 
            color: #F8FAFC;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        @keyframes ticker-move {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>北海道&nbsp;&nbsp;道路交通情報</h1>
        <p id="status-text">● 24H広域道路運行管制システム（現場完全同期版）</p>
    </div>

    <div class="main-dashboard-layout">
        
        <div class="board-container info-left">
            <p class="board-title left-title"><span>🚨 重大障害・通行止め・事故情報（最優先）</span><span id="left-clock-tag" style="color: #FCA5A5; font-size:13px;">（同期中）</span></p>
            <div class="board-content-wrapper" id="left-outer-box">
                <div class="scroll-inner-container" id="left-inner-container">
                    <div class="no-alert no-alert-gray">⚡ 管制データを読み込んでいます...</div>
                </div>
            </div>
        </div>

        <div class="board-container info-right">
            <p class="board-title right-title"><span>🚧 路線内 工事・車線規制・維持作業</span><span id="right-clock-tag" style="color: #FDE047; font-size:13px;">（同期中）</span></p>
            <div class="board-content-wrapper" id="right-outer-box">
                <div class="scroll-inner-container" id="right-inner-container">
                    <div class="no-alert no-alert-gray">⚡ 管制データを読み込んでいます...</div>
                </div>
            </div>
        </div>

    </div>

    <div class="ticker-container">
        <div class="ticker-title">道路ニュース速報</div>
        <div class="ticker-text-wrapper">
            <div id="live-ticker-text" class="ticker-text">北海道地方道路交通情報を24時間リアルタイム巡航中。</div>
        </div>
    </div>

    <script>
        let leftScrollTimer = null; 
        let rightScrollTimer = null; 

        function checkHokkaidoTrafficTextOnly() {
            const jsonUrl = `./data.json?t=${new Date().getTime()}`;

            fetch(jsonUrl)
                .then(response => {
                    if (!response.ok) throw new Error("data.jsonが見つかりません。");
                    return response.json();
                })
                .then(jsonData => {
                    updateControlBoard(jsonData);
                })
                .catch(error => {
                    console.error("データ同期エラー:", error);
                });
        }

        function updateControlBoard(jsonData) {
            const now = new Date();
            const timeStr = `${now.getHours()}時${String(now.getMinutes()).padStart(2, '0')}分現在`;
            
            document.getElementById("left-clock-tag").innerText = `（${timeStr} 更新）`;
            document.getElementById("right-clock-tag").innerText = `（${timeStr} 更新）`;

            let redAlerts = [];   
            let yellowAlerts = [];
            let closedCount = 0; 
            let constCount = 0;  

            // 📊 運行管制網（初期の大成功版リストに、今回の栗沢、訓子府、BSなどの網を完全融合）
            const targetKeywords = [
                "大沼", "落部", "森", "八雲", "長万部", "豊浦", "虻田洞爷湖", "虻田洞爺湖", "伊達", "室蘭", "登別", "白老", "苫小牧", 
                "千歳", "恵庭", "輪厚", "北広島", "札幌南", "大谷地", "札幌IC", "江別西", "江別東", "岩見沢", "三笠", "美唄", "砂川", "滝川", "野幌",
                "七飯藤城", "黒岩", "国縫", "静狩", "礼文", "虻田", "有珠山", "北吉原", "竹浦", "萩野", "錦岡", "苫小牧西", "苫小牧中央", "苫小牧東", 
                "新千歳空港", "美沢", "祝梅", "茶志内", "奈井江砂川", "江部乙", "深川", "音江連山", "旭川鷹栖", "旭川北", "比布大雪", "比布JCT", "和寒", "士別剣淵", "道央", "札幌JCT",
                "樽前", "野幌PA", "比布PA", "有珠山SA", "本輪西", "本輪西PA", "富浦", "富浦PA", "美沢PA", "茶志内SA", "砂川SA", "音江連山PA",
                "札樽", "小樽", "朝里", "銭函", "手稲", "新川", "札幌北", "伏古", "雁来", "小樽IC", "小樽JCT", "張碓", "金山", "札幌西", "張碓PA", "金山PA",
                "占跨", "占観", "占微", "占冠", "十勝清水", "トマム", "芽室", "夕張", "穂別", "追分", "追分町", 
                "長流枝", "音更帯広", "池田", "本別", "足寄", "浦幌", "白糠", "庶路", "阿寒", "千歳恵庭JCT", "キウス", "由仁", "むかわ穂別", "十勝平原", "帯広JCT", "上浦幌", "釧路西", "大楽毛",
                "由仁PA", "むかわ穂別PA", "占冠PA", "十勝平原SA", "長流枝PA",
                "深川西", "秩父別", "沼田", "北竜ひまわり", "留萌大和田", "留萌", "幌糠",
                "愛別", "層雲峡", "浮島", "白滝", "丸瀬布", "遠軽", "旭川紋別", "上川天幕", "上川層雲峡", "奥白滝",
                "沼ノ端", "苫東中央", "厚真", "鵡川", "汐見", "富川", "日高富川", "門別", "日高門別",
                "川西", "幸福", "中札内", "更別", "忠類", "大樹", 
                "名寄", "智恵文", "美深", "音威子府", "豊富", "幌延", "中川",
                "釧路中央", "釧路東", "別保", "尾幌", "糸魚沢", "厚岸", "茶内", "浜中", "温根沼", "根室",
                "陸別", "置戸", "訓子府", "北見西", "北見北上", "北見中央", "北見川東", "北見東",
                "スマート", "流出", "スマートＩＣ", "スマートIC", "砂川スマート", 
                "ＢＳ", "BS", "バスストップ", "停留所", "栗沢"
            ];

            if (jsonData.features && Array.isArray(jsonData.features)) {
                jsonData.features.forEach(feature => {
                    const props = feature.properties;
                    if (!props) return;

                    let rdText = (props.rd || "").toString().trim(); 
                    let cText = (props.c || "").toString().trim();   
                    let iText = (props.i || "").toString().trim();   

                    // 🌟 【原点回帰の命綱チェック】文字が書き込まれている有効な規制データであるか判定
                    let isAlert = rdText.includes("通行止") || rdText.includes("事故") || rdText.includes("規制") || 
                                  cText.includes("工事") || cText.includes("規制") || cText.includes("作業") || 
                                  cText.includes("車線") || cText.includes("補修") || cText.includes("路肩") || 
                                  rdText.includes("障害") || cText.includes("障害");

                    if (!isAlert) return;

                    // 🌟 キーワード一致確認
                    let isHit = targetKeywords.some(keyword => iText.includes(keyword) || rdText.includes(keyword) || cText.includes(keyword));

                    if (isHit) {
                        let routeName = "管轄専用道";
                        if (iText.includes("深川留萌") || iText.includes("深川西") || iText.includes("北竜") || iText.includes("留萌") || iText.includes("幌糠")) routeName = "深川留萌自動車道";
                        else if (iText.includes("帯広広尾") || iText.includes("中札内") || iText.includes("大樹") || iText.includes("幸福") || iText.includes("更別")) routeName = "帯広広尾自動車道";
                        else if (iText.includes("旭川紋別") || iText.includes("白滝") || iText.includes("遠軽") || iText.includes("上川") || iText.includes("愛別")) routeName = "旭川紋別自動車道";
                        else if (iText.includes("日高") || iText.includes("局") || iText.includes("門別")) routeName = "日高自動車道";
                        else if (iText.includes("名寄美深") || iText.includes("美深") || iText.includes("音威子府") || iText.includes("豊富")) routeName = "名寄美深道路";
                        else if (iText.includes("道東") || iText.includes("占冠") || iText.includes("トマム") || iText.includes("清水") || iText.includes("追分") || iText.includes("長流枝") || iText.includes("音更") || iText.includes("池田") || iText.includes("本別") || iText.includes("足寄") || iText.includes("浦幌") || iText.includes("白糠") || iText.includes("阿寒") || iText.includes("釧路西") || iText.includes("大楽毛") || iText.includes("由仁") || iText.includes("訓子府")) routeName = "道東自動車道";
                        else if (iText.includes("釧路") || iText.includes("別保") || iText.includes("尾幌") || iText.includes("厚岸") || iText.includes("根室")) routeName = "釧路・根室専用道";
                        else if (iText.includes("オホーツク") || iText.includes("訓子府") || iText.includes("置戸") || iText.includes("陸別") || iText.includes("北見")) routeName = "十勝オホーツク自動車道";
                        else if (iText.includes("札樽") || iText.includes("小樽") || iText.includes("手稲") || iText.includes("新川") || iText.includes("札幌北") || iText.includes("張跨") || iText.includes("銭函") || iText.includes("金山")) routeName = "札樽自動車道";
                        else if (iText.includes("道央") || iText.includes("江別") || iText.includes("岩見沢") || iText.includes("千歳") || iText.includes("大沼") || iText.includes("北広島") || iText.includes("大谷地") || iText.includes("札幌IC") || iText.includes("輪厚") || iText.includes("旭川") || iText.includes("士別") || iText.includes("室蘭") || iText.includes("苫小牧") || iText.includes("樽前") || iText.includes("有珠山") || iText.includes("茶志内") || iText.includes("砂川") || iText.includes("野幌") || iText.includes("栗沢") || iText.includes("三笠")) routeName = "道央自動車道";
                        
                        if (routeName === "管轄専用道" && rdText && !rdText.includes("通行止")) {
                            routeName = rdText;
                        }

                        // 🌟 【付近付近・絶対根絶】文字の末尾が「付近」で終わる場合のみ削る、安全な切り出し
                        let displayLocation = iText;
                        if (displayLocation.endsWith("付近")) {
                            displayLocation = displayLocation.slice(0, -2);
                        }

                        let detailText = `${routeName}：${displayLocation}付近において、${cText || rdText || "規制情報"}が検出されています。`;
                        detailText = detailText.replace("規制なし：", "");

                        // 🌟 【新・重複バグの完全修正】
                        // すでに処理中のJARTICデータ内に、全く同じ文章（detailText）が登録されている場合は、
                        // 過去のゾンビ残骸がダブって複製されている証拠なので、ここで強制排除（スキップ）する！
                        if (redAlerts.some(a => a.text === detailText) || yellowAlerts.some(a => a.text === detailText)) {
                            return; 
                        }

                        // 💥 分類判定：「通行止」「事故」「障害」が入っていたら無条件で左側（赤札）へ
                        if (rdText.includes("通行止") || rdText.includes("事故") || cText.includes("事故") || rdText.includes("障害") || cText.includes("障害")) {
                            let typeTag = "【🚨 通行止め】";
                            if (rdText.includes("事故") || cText.includes("事故")) typeTag = "【💥 事故発生】";
                            else if (rdText.includes("障害") || cText.includes("障害")) typeTag = "【📦 路上障害】";
                            
                            redAlerts.push({ text: detailText, tag: typeTag });
                        } else {
                            // 🚧 それ以外は右側（黄札）へ
                            yellowAlerts.push({ text: detailText });
                        }
                    }
                });
            }

            // 最終HTML組み立て
            let finalRedHTMLs = []; let finalYellowHTMLs = [];

            redAlerts.forEach(item => {
                closedCount++;
                finalRedHTMLs.push(`<div class="alert-item-red"><span class="alert-closed-tag">${item.tag}</span> ${item.text}</div>`);
            });

            yellowAlerts.forEach(item => {
                constCount++;
                finalYellowHTMLs.push(`<div class="alert-item-yellow"><span class="alert-const-tag">【⚠️ 規制・工事】</span> ${item.text}</div>`);
            });

            // 左側（重大障害）描画
            const leftInner = document.getElementById("left-inner-container");
            if (finalRedHTMLs.length === 0) {
                leftInner.innerHTML = `<div class="no-alert no-alert-green">🟢 現在、広域管制経路内に<br>通行止めや事故等の重大障害はありません。</div>`;
                leftInner.style.top = "15px"; if (leftScrollTimer) clearInterval(leftScrollTimer);
            } else { leftInner.innerHTML = finalRedHTMLs.join(""); startAutoScrollEngine("left"); }

            // 右側（工事規制）描画
            const rightInner = document.getElementById("right-inner-container");
            if (finalYellowHTMLs.length === 0) {
                rightInner.innerHTML = `<div class="no-alert no-alert-green">🟢 現在、広域管制経路内に<br>工事・車線規制情報はありません。</div>`;
                rightInner.style.top = "15px"; if (rightScrollTimer) clearInterval(rightScrollTimer);
            } else { rightInner.innerHTML = finalYellowHTMLs.join(""); startAutoScrollEngine("right"); }

            // テロップ更新
            let tickerParts = [`【情報同期】${timeStr}更新`, `【運行管制】指定特定経路リアルタイム巡航中`];
            if (closedCount > 0) { tickerParts.push(`⚠️緊急速報：高速道路網で【通行止め・事故障害】が現在 ${closedCount} 件発生しています。`); } 
            else { tickerParts.push("🟢現在、広域管制経路内に通行止めや大事故情報はありません。"); }
            if (constCount > 0) tickerParts.push(`【運行規制】各路線で車線規制・維持補修を作業計 ${constCount} 件検出。`);
            document.getElementById("live-ticker-text").innerText = tickerParts.join(" ｜ ");
        }

        function startAutoScrollEngine(side) {
            if (side === "left" && leftScrollTimer) clearInterval(leftScrollTimer);
            if (side === "right" && rightScrollTimer) clearInterval(rightScrollTimer);

            const outerBox = document.getElementById(`${side}-outer-box`);
            const innerBox = document.getElementById(`${side}-inner-container`);
            innerBox.style.top = "15px"; 
            
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight; const innerHeight = innerBox.clientHeight;
                if (innerHeight > outerHeight - 20) {
                    let currentTop = 15; const maxScroll = -(innerHeight - outerHeight + 30);
                    const timer = setInterval(() => {
                        currentTop -= 1; innerBox.style.top = currentTop + "px";
                        if (currentTop <= maxScroll) {
                            clearInterval(timer);
                            setTimeout(() => { innerBox.style.top = "15px"; setTimeout(() => startAutoScrollEngine(side), 1000); }, 3000); 
                        }
                    }, 40); 
                    if (side === "left") leftScrollTimer = timer; if (side === "right") rightScrollTimer = timer;
                }
            }, 2000); 
        }

        setInterval(checkHokkaidoTrafficTextOnly, 60000); 
        setTimeout(checkHokkaidoTrafficTextOnly, 100);
    </script>
</body>
</html>
