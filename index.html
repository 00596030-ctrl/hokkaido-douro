<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北海道&nbsp;&nbsp;道路交通情報</title>
    <style>
        html, body {
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: "Helvetica Neue", "Segoe UI", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow: hidden; 
        }

        body {
            padding: 12px 12px 0 12px; 
            display: flex;
            flex-direction: column;
        }

        .header-container {
            text-align: center;
            height: 55px;
            border-bottom: 2px solid #334155;
            margin-bottom: 10px; 
            flex-shrink: 0;
        }

        .header-container h1 {
            margin: 0;
            font-size: 26px;
            color: #38BDF8;
            letter-spacing: 1px;
        }

        #status-text {
            font-size: 13px;
            color: #E2E8F0;
            margin: 2px 0 0 0;
            font-weight: bold;
        }

        .main-dashboard-layout {
            display: flex;
            gap: 15px;
            width: 100%;
            height: calc(100vh - 165px); 
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .board-container {
            display: flex;
            flex-direction: column;
            background-color: #020617;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 18px;
            box-sizing: border-box;
        }

        .info-left {
            width: 70%;
        }

        .stream-right {
            width: 30%;
            gap: 12px; 
        }

        .board-title {
            color: #38BDF8;
            font-size: 16px;
            margin: 0 0 12px 0;
            font-weight: bold;
            border-bottom: 1px solid #1E293B;
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .board-content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            border-radius: 8px;
            overflow: hidden;
            box-sizing: border-box;
        }

        #fixed-danger-zone {
            flex-shrink: 0;
            background-color: #000000;
            padding: 15px 15px 5px 15px;
            box-sizing: border-box;
        }

        #scroll-outer-box {
            flex: 1;
            background-color: #000000;
            padding: 5px 15px 15px 15px;
            overflow: hidden; 
            box-sizing: border-box;
            position: relative;
        }

        .yahoo-half-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .yahoo-scroll-area {
            flex: 1;
            background-color: #000000;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1E293B;
            overflow: hidden; 
            margin: 0;
            box-sizing: border-box;
            position: relative;
        }

        .yahoo-inner-container {
            position: absolute;
            width: calc(100% - 24px);
            top: 12px;
            transition: top 0.3s ease-out;
        }

        #scroll-inner-container {
            position: absolute;
            width: calc(100% - 30px);
            top: 5px;
            transition: top 0.3s ease-out; 
        }

        .alert-item {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 12px 18px;
            border-radius: 8px;
            border-left: 6px solid #EF4444;
            background-color: rgba(239, 68, 68, 0.1);
        }
        
        .alert-closed {
            color: #EF4444;
            font-weight: bold;
        }

        .alert-construction {
            color: #F59E0B;
            font-weight: bold;
            border-left-color: #F59E0B;
            background-color: rgba(245, 158, 11, 0.1);
            margin-bottom: 12px;
        }

        .no-alert {
            color: #22C55E;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 130px;
            line-height: 1.8;
            width: 100%;
        }

        .yahoo-text-item {
            font-size: 14px;
            line-height: 1.6;
            padding: 10px 12px;
            border-bottom: 1px solid #1E293B;
            color: #E2E8F0;
        }
        .yahoo-text-item:last-child {
            border-bottom: none;
        }
        .weather-highlight {
            color: #38BDF8; 
            font-weight: bold;
        }
        .accident-highlight {
            color: #FBBF24; 
            font-weight: bold;
        }

        .ticker-container {
            width: 100%;
            height: 75px; 
            background-color: #020617;
            border-top: 4px solid #475569; 
            margin-top: 10px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .ticker-title {
            background-color: #B91C1C; 
            color: #FFFFFF;
            font-size: 20px; 
            font-weight: bold;
            padding: 0 35px;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            z-index: 10;
            border-right: 4px solid #475569;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .ticker-text-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; 
            animation: ticker-move 32s linear infinite; 
            font-size: 24px; 
            color: #F8FAFC;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        @keyframes ticker-move {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>北海道&nbsp;&nbsp;道路交通情報</h1>
        <p id="status-text">● 24Hリアルタイム情報管制運行中</p>
    </div>

    <div class="main-dashboard-layout">
        
        <div class="board-container info-left">
            <p class="board-title"><span>🚨 管制経路内 運行規制情報情報板</span><span id="live-clock-tag" style="color: #A5F3FC; font-size:13px; font-weight: bold;">（同期中）</span></p>
            
            <div class="board-content-wrapper">
                <div id="fixed-danger-zone"></div>
                
                <div class="scroll-outer-box" id="scroll-outer-box">
                    <div id="scroll-inner-container">
                        <div class="no-alert" style="color: #64748B;">⚡ 道路交通情報を読み込んでいます...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="board-container stream-right">
            <div class="yahoo-half-box">
                <p style="color: #38BDF8; font-size: 13px; font-weight: bold; margin: 0 0 6px 0;">🌦️ ① Yahoo!天気・災害情報（北海道）</p>
                <div id="weather-outer-box" class="yahoo-scroll-area">
                    <div id="weather-inner-container" class="yahoo-inner-container">
                        <div class="yahoo-text-item" style="color:#64748B;">🌦️ 気象情報を読み込み中...</div>
                    </div>
                </div>
            </div>
            <div class="yahoo-half-box">
                <p style="color: #4ADE80; font-size: 13px; font-weight: bold; margin: 6px 0 6px 0;">🚘 ② Yahoo!ニュース（交通事故・気象・災害）</p>
                <div id="accident-outer-box" class="yahoo-scroll-area">
                    <div id="accident-inner-container" class="yahoo-inner-container">
                        <div class="yahoo-text-item" style="color:#64748B;">🚘 道路影響ニュースを読み込み中...</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="ticker-container">
        <div class="ticker-title">道路ニュース速報</div>
        <div class="ticker-text-wrapper">
            <div id="live-ticker-text" class="ticker-text">北海道地方道路交通情報、およびYahoo!ニュース速報をリアルタイム巡航中。</div>
        </div>
    </div>

    <script>
        let scrollTimer = null; 
        let weatherTimer = null; 
        let accidentTimer = null; 
        let cachedTickerYahooNews = []; 

        // 🛡️ キャッシュ（古い記憶）を強制破壊するパスワード付きでJARTIC生データを引きずり出す
        function mainTrafficEngine() {
            const timestamp = new Date().getTime();
            const jsonUrl = `./data.json?cache=${timestamp}`; // 🛠️ キャッシュ強制破壊パラメーター
            
            fetch(jsonUrl)
                .then(response => { if (!response.ok) throw new Error(); return response.json(); })
                .then(jsonData => { updateControlBoard(jsonData); })
                .catch(error => { console.log("Traffic cache bypass active."); });
        }

        function sideWeatherEngine() {
            const timestamp = new Date().getTime();
            const xmlUrl = `./yahoo_weather.xml?cache=${timestamp}`;
            
            fetch(xmlUrl)
                .then(res => res.text())
                .then(xmlText => {
                    if (xmlText.includes("<!DOCTYPE") || xmlText.includes("<html") || xmlText.includes("<HTML")) {
                        document.getElementById("weather-inner-container").innerHTML = `<div class="yahoo-text-item" style="color:#64748B;">🟢 現在、北海道内に重大な気象警報・災害速報はありません。</div>`;
                        return;
                    }
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    const items = xmlDoc.getElementsByTagName("title");
                    
                    let htmlParts = [];
                    for (let i = 1; i < items.length; i++) {
                        if (items[i] && items[i].textContent) {
                            const val = items[i].textContent.trim();
                            if(val.length > 0 && !val.includes("Yahoo!ニュース")) {
                                htmlParts.push(`<div class="yahoo-text-item"><span class="weather-highlight">🌦️【防災・天気】</span>${val}</div>`);
                            }
                        }
                    }
                    if(htmlParts.length > 0) {
                        document.getElementById("weather-inner-container").innerHTML = htmlParts.join("");
                        startDynamicYahooScroll("weather-outer-box", "weather-inner-container", "weather");
                    } else {
                        document.getElementById("weather-inner-container").innerHTML = `<div class="yahoo-text-item" style="color:#64748B;">🟢 現在、北海道内に重大な気象警報・災害速報はありません。</div>`;
                    }
                })
                .catch(err => { 
                    document.getElementById("weather-inner-container").innerHTML = `<div class="yahoo-text-item" style="color:#64748B;">🟢 現在、北海道内に重大な気象警報・災害速報はありません。</div>`;
                });
        }

        function sideNewsEngine() {
            const timestamp = new Date().getTime();
            const xmlUrl = `./yahoo_news.xml?cache=${timestamp}`;
            
            fetch(xmlUrl)
                .then(res => res.text())
                .then(xmlText => {
                    if (xmlText.includes("<!DOCTYPE") || xmlText.includes("<html") || xmlText.includes("<HTML")) {
                        document.getElementById("accident-inner-container").innerHTML = `<div class="yahoo-text-item" style="color:#22C55E;">🟢 現在、運行に影響する事故・大雪災害のニュースはありません。</div>`;
                        return;
                    }
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    const items = xmlDoc.getElementsByTagName("title");
                    
                    let htmlParts = [];
                    let tickerTexts = [];
                    
                    const targetTrafficWords = ["事故", "交通", "衝突", "死亡", "運転", "道路", "高速", "規制", "通行", "大雪", "吹雪", "暴風", "台風", "大雨", "火災", "運休", "トラック", "乗用車", "ひき逃げ", "追突", "横転", "列車", "遅延", "けが", "搬送", "消防", "警察", "立ち往生", "渋滞", "閉鎖"];

                    for (let i = 1; i < items.length; i++) {
                        if (items[i] && items[i].textContent) {
                            const titleText = items[i].textContent.trim();
                            let isRealTrafficNews = targetTrafficWords.some(key => titleText.includes(key));
                            
                            if (isRealTrafficNews) {
                                htmlParts.push(`<div class="yahoo-text-item"><span class="accident-highlight">🚨【道路ニュース】</span>${titleText}</div>`);
                                tickerTexts.push(`【Yahoo!ニュース】${titleText}`);
                            }
                        }
                    }
                    
                    if (htmlParts.length === 0) {
                        htmlParts.push(`<div class="yahoo-text-item" style="color:#22C55E;">🟢 現在、運行に影響する事故・大雪災害のニュースはありません。</div>`);
                    }
                    
                    document.getElementById("accident-inner-container").innerHTML = htmlParts.join("");
                    cachedTickerYahooNews = tickerTexts;
                    startDynamicYahooScroll("accident-outer-box", "accident-inner-container", "accident");
                })
                .catch(err => { 
                    document.getElementById("accident-inner-container").innerHTML = `<div class="yahoo-text-item" style="color:#22C55E;">🟢 現在、運行に影響する事故・大雪災害のニュースはありません。</div>`;
                });
        }

        function updateControlBoard(jsonData) {
            const now = new Date();
            const timeStr = `${now.getHours()}時${String(now.getMinutes()).padStart(2, '0')}分現在`;
            document.getElementById("live-clock-tag").innerText = `（${timeStr} 管制同期完了）`;

            let redAlerts = [];   
            let yellowAlerts = [];
            let closedCount = 0; 
            let constCount = 0;  

            const targetKeywords = [
                "大沼", "落部", "森", "八雲", "長万部", "豊浦", "虻田洞爷湖", "虻田洞爺湖", "伊達", "室蘭", "登別", "白老", "苫小牧", 
                "千歳", "恵庭", "輪厚", "北広島", "札幌南", "大谷地", "札幌IC", "江別西", "江別東", "岩見沢", "三笠", "美唄", "砂川", "滝川", "野幌",
                "七飯藤城", "黒岩", "国縫", "静狩", "礼文", "虻田", "有珠山", "北吉原", "竹浦", "萩野", "錦岡", "苫小牧西", "苫小牧中央", "苫小牧東", 
                "新千歳空港", "美沢", "祝梅", "茶志内", "奈井江砂川", "江部乙", "深川", "音江連山", "旭川鷹栖", "旭川北", "比布大雪", "比布JCT", "和寒", "士別剣淵", "道央", "札幌JCT",
                "樽前", "樽前SA", "野幌PA", "比布PA", "有珠山SA", "本輪西", "本輪西PA", "富浦", "富浦PA", "美沢PA", "茶志内SA", "砂川SA", "音江連山PA",
                "札樽", "小樽", "朝里", "銭函", "手稲", "新川", "札幌北", "伏古", "雁来", "小樽IC", "小樽JCT", "張碓", "金山", "札幌西", "張碓PA", "金山PA",
                "占跨", "占観", "占微", "占冠", "十勝清水", "トマム", "芽室", "夕張", "穂別", "追分", "追分町", 
                "長流枝", "音更帯広", "池田", "本別", "足寄", "浦幌", "白糠", "庶路", "阿寒", "千歳恵庭JCT", "キウス", "由仁", "むかわ穂別", "十勝平原", "帯広JCT", "上浦幌", "釧路西", "大楽毛",
                "由仁PA", "むかわ穂別PA", "占冠PA", "十勝平原SA", "長流枝PA",
                "深川西", "秩父別", "沼田", "北竜ひまわり", "留萌大和田", "留萌", "幌糠",
                "愛別", "層雲峡", "浮島", "白滝", "丸瀬布", "遠軽", "旭川紋別", "上川天幕", "上川層雲峡", "奥白滝",
                "沼ノ端", "苫東中央", "厚真", "鵡川", "汐見", "富川", "日高富川", "門別", "日高門別",
                "川西", "幸福", "中札内", "更別", "忠類", "大樹", 
                "名寄", "智恵文", "美深", "音威子府", "豊富", "幌延", "中川",
                "釧路中央", "釧路東", "別保", "尾幌", "糸魚沢", "厚岸", "茶内", "浜中", "温根沼", "根室",
                "陸別", "置戸", "訓子府", "北見西", "北見北上", "北見中央", "北見川東", "北見東"
            ];

            if (jsonData.features && Array.isArray(jsonData.features)) {
                jsonData.features.forEach(feature => {
                    const props = feature.properties;
                    if (!props) return;
                    let rdText = props.rd || ""; let cText = props.c || ""; let iText = props.i || "";   
                    let isAlert = rdText.includes("通行止") || rdText.includes("事故") || rdText.includes("規制") || 
                                  cText.includes("工事") || cText.includes("規制") || cText.includes("作業") || 
                                  cText.includes("車線") || cText.includes("補修") || cText.includes("路肩") || rdText.includes("障害");
                    if (!isAlert) return;
                    let isHit = targetKeywords.some(keyword => iText.includes(keyword) || rdText.includes(keyword) || cText.includes(keyword));
                    if (isHit) {
                        let routeName = "管轄専用道";
                        if (iText.includes("深川留萌") || iText.includes("深川西") || iText.includes("北竜") || iText.includes("留萌") || iText.includes("幌糠")) routeName = "深川留萌自動車道";
                        else if (iText.includes("帯広広尾") || iText.includes("中札内") || iText.includes("大樹") || iText.includes("幸福") || iText.includes("更別")) routeName = "帯広広尾自動車道";
                        else if (iText.includes("旭川紋別") || iText.includes("白滝") || iText.includes("遠軽") || iText.includes("上川") || iText.includes("愛別")) routeName = "旭川紋別自動車道";
                        else if (iText.includes("日高") || iText.includes("沼ノ端") || iText.includes("厚真") || iText.includes("鵡川") || iText.includes("門別")) routeName = "日高自動車道";
                        else if (iText.includes("名寄美深") || iText.includes("美深") || iText.includes("音威子府") || iText.includes("豊富")) routeName = "名寄美深道路";
                        else if (iText.includes("道東") || iText.includes("占冠") || iText.includes("トマム") || iText.includes("清水") || iText.includes("追分") || iText.includes("長流枝") || iText.includes("音更") || iText.includes("池田") || iText.includes("本別") || iText.includes("足寄") || iText.includes("浦幌") || iText.includes("白糠") || iText.includes("阿寒") || iText.includes("釧路西") || iText.includes("大楽毛") || iText.includes("由仁")) routeName = "道東自動車道";
                        else if (iText.includes("釧路") || iText.includes("別保") || iText.includes("尾幌") || iText.includes("厚岸") || iText.includes("根室")) routeName = "釧路・根室専用道";
                        else if (iText.includes("オホーツク") || iText.includes("訓子府") || iText.includes("置戸") || iText.includes("陸別") || iText.includes("北見")) routeName = "十勝オホーツク自動車道";
                        else if (iText.includes("札樽") || iText.includes("小樽") || iText.includes("手稲") || iText.includes("新川") || iText.includes("札幌北") || iText.includes("張跨") || iText.includes("銭函") || iText.includes("金山")) routeName = "札樽自動車道";
                        else if (iText.includes("道央") || iText.includes("江別") || iText.includes("岩見沢") || iText.includes("千歳") || iText.includes("大沼") || iText.includes("北広島") || iText.includes("大谷地") || iText.includes("輪厚") || iText.includes("旭川") || iText.includes("士別") || iText.includes("室蘭") || iText.includes("苫小牧") || iText.includes("樽前") || iText.includes("有珠山") || iText.includes("茶志内") || iText.includes("砂川")) routeName = "道央自動車道";
                        if (routeName === "管轄専用道" && rdText && !rdText.includes("通行止")) { routeName = rdText; }
                        let detailText = `${routeName}：${iText}付近において、${cText || rdText || "規制情報"}が検出されています。`;
                        if (rdText.includes("通行止")) { redAlerts.push({ text: detailText }); } else { yellowAlerts.push({ text: detailText }); }
                    }
                });
            }

            let finalRedHTMLs = []; let finalYellowHTMLs = []; let seenTexts = new Set(); let seenRouteGeoKeys = new Set();

            redAlerts.forEach(item => {
                if (seenTexts.has(item.text)) return;
                let geoTokens = []; targetKeywords.forEach(kw => { if (item.text.includes(kw)) geoTokens.push(kw); });
                if (geoTokens.length >= 2) { geoTokens.sort(); let geoKey = geoTokens[0] + "-" + geoTokens[1] + "-red"; if (seenRouteGeoKeys.has(geoKey)) return; seenRouteGeoKeys.add(geoKey); }
                seenTexts.add(item.text); closedCount++;
                finalRedHTMLs.push(`<div class="alert-item"><span class="alert-closed">【🚨 通行止め】</span> ${item.text}</div>`);
            });

            yellowAlerts.forEach(item => {
                if (seenTexts.has(item.text)) return;
                let geoTokens = []; targetKeywords.forEach(kw => { if (item.text.includes(kw)) geoTokens.push(kw); });
                if (geoTokens.length >= 2) { geoTokens.sort(); let geoKey = geoTokens[0] + "-" + geoTokens[1] + "-yellow"; if (seenRouteGeoKeys.has(geoKey)) return; seenRouteGeoKeys.add(geoKey); }
                seenTexts.add(item.text); constCount++;
                finalYellowHTMLs.push(`<div class="alert-item alert-construction"><span class="alert-construction">【⚠️ 規制・障害情報】</span> ${item.text}</div>`);
            });

            document.getElementById("fixed-danger-zone").innerHTML = finalRedHTMLs.join("");
            const innerContainer = document.getElementById("scroll-inner-container");
            
            if (finalRedHTMLs.length === 0 && finalYellowHTMLs.length === 0) {
                innerContainer.innerHTML = `<div class="no-alert">🟢 現在（${timeStr}）、道内全域 of 指定管制経路内に<br>通行止め・重大な規制情報はありません（順調）。</div>`;
                innerContainer.style.top = "5px"; if (scrollTimer) clearInterval(scrollTimer);
            } else {
                if (finalYellowHTMLs.length > 0) { innerContainer.innerHTML = finalYellowHTMLs.join(""); startAutoScrollEngine(); } 
                else { innerContainer.innerHTML = ""; if (scrollTimer) clearInterval(scrollTimer); }
            }

            let tickerParts = [`【情報同期】${timeStr}更新`, `【運行管制】指定特定経路リアルタイム巡航中`];
            if (closedCount > 0) { tickerParts.push(`⚠️緊急速報：現在、道内高速道路網で【通行止め】が現在 ${closedCount} 件発生しています。各現場情報に従い一般道等への迂回をご検討ください。`); } 
            else { tickerParts.push(`🟢現在、広域管制経路内に災害や大事故による通行止め情報はありません（通行順調）。`); }
            if (constCount > 0) tickerParts.push(`【運行規制】各路線において障害・車線規制・維持補修作業が計 ${constCount} 件検出されています。`);
            
            if (cachedTickerYahooNews.length > 0) { tickerParts = tickerParts.concat(cachedTickerYahooNews); }
            document.getElementById("live-ticker-text").innerText = tickerParts.join(" ｜ ");
        }

        function startAutoScrollEngine() {
            if (scrollTimer) clearInterval(scrollTimer);
            const outerBox = document.getElementById("scroll-outer-box");
            const innerBox = document.getElementById("scroll-inner-container");
            innerBox.style.top = "5px"; 
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight; const innerHeight = innerBox.clientHeight;
                if (innerHeight > outerHeight - 20) {
                    let currentTop = 5; const maxScroll = -(innerHeight - outerHeight + 25);
                    scrollTimer = setInterval(() => {
                        currentTop -= 1; innerBox.style.top = currentTop + "px";
                        if (currentTop <= maxScroll) { clearInterval(scrollTimer); setTimeout(() => { innerBox.style.top = "5px"; setTimeout(startAutoScrollEngine, 1000); }, 2000); }
                    }, 40); 
                }
            }, 2000); 
        }

        function startDynamicYahooScroll(outerId, innerId, type) {
            let timerName = type === "weather" ? weatherTimer : accidentTimer;
            if (timerName) clearInterval(timerName);
            const outerBox = document.getElementById(outerId); const innerBox = document.getElementById(innerId);
            innerBox.style.top = "12px"; 
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight; const innerHeight = innerBox.clientHeight;
                if (innerHeight > outerHeight - 24) {
                    let currentTop = 12; const maxScroll = -(innerHeight - outerHeight + 24);
                    const runningTimer = setInterval(() => {
                        currentTop -= 0.3; innerBox.style.top = currentTop + "px";
                        if (currentTop <= maxScroll) {
                            clearInterval(runningTimer);
                            setTimeout(() => { innerBox.style.top = "12px"; setTimeout(() => { startDynamicYahooScroll(outerId, innerId, type); }, 1000); }, 5000);
                        }
                    }, 35); 
                    if (type === "weather") weatherTimer = runningTimer; else accidentTimer = runningTimer;
                }
            }, 4000); 
        }

        function runAllEnginesSecurely() {
            mainTrafficEngine();     
            sideWeatherEngine();     
            sideNewsEngine();        
        }

        setInterval(runAllEnginesSecurely, 60000);
        setTimeout(runAllEnginesSecurely, 100);
    </script>
</body>
</html>
