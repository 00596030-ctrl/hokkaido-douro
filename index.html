<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北海道&nbsp;&nbsp;道路交通情報</title>
    <style>
        html, body {
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: "Helvetica Neue", "Segoe UI", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow: hidden; 
        }

        body {
            padding: 12px 12px 0 12px; 
            display: flex;
            flex-direction: column;
        }

        .header-container {
            text-align: center;
            height: 55px;
            border-bottom: 2px solid #334155;
            margin-bottom: 10px; 
            flex-shrink: 0;
        }

        .header-container h1 {
            margin: 0;
            font-size: 26px;
            color: #38BDF8;
            letter-spacing: 1px;
        }

        #status-text {
            font-size: 13px;
            color: #E2E8F0;
            margin: 2px 0 0 0;
            font-weight: bold;
        }

        .main-dashboard-layout {
            display: flex;
            gap: 15px;
            width: 100%;
            height: calc(100vh - 165px); 
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .board-container {
            display: flex;
            flex-direction: column;
            background-color: #020617;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 18px;
            box-sizing: border-box;
        }

        .info-left {
            width: 70%;
        }

        .stream-right {
            width: 30%;
            gap: 10px; 
        }

        .board-title {
            color: #38BDF8;
            font-size: 16px;
            margin: 0 0 12px 0;
            font-weight: bold;
            border-bottom: 1px solid #1E293B;
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .board-content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #000000;
            border-radius: 8px;
            overflow: hidden;
            box-sizing: border-box;
        }

        #fixed-danger-zone {
            flex-shrink: 0;
            background-color: #000000;
            padding: 15px 15px 5px 15px;
            box-sizing: border-box;
        }

        #scroll-outer-box {
            flex: 1;
            background-color: #000000;
            padding: 5px 15px 15px 15px;
            overflow: hidden; 
            box-sizing: border-box;
            position: relative;
        }

        .log-half-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-scroll-area {
            flex: 1;
            background-color: #000000;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1E293B;
            overflow-y: auto;
            margin: 0;
            box-sizing: border-box;
            position: relative;
        }

        #scroll-inner-container {
            position: absolute;
            width: calc(100% - 30px);
            top: 5px;
            transition: top 0.3s ease-out; 
        }

        #log-raw-json-container {
            position: absolute;
            width: calc(100% - 24px);
            top: 12px;
            transition: top 0.2s ease-out; /* 🛠️ スピードアップに伴い追従をなめらかに */
        }

        .alert-item {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 12px;
            padding: 12px 18px;
            border-radius: 8px;
            border-left: 6px solid #EF4444;
            background-color: rgba(239, 68, 68, 0.1);
        }
        
        .alert-closed {
            color: #EF4444;
            font-weight: bold;
        }

        .alert-construction {
            color: #F59E0B;
            font-weight: bold;
            border-left-color: #F59E0B;
            background-color: rgba(245, 158, 11, 0.1);
            margin-bottom: 12px;
        }

        .no-alert {
            color: #22C55E;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 130px;
            line-height: 1.8;
        }

        #log-live-communication {
            color: #38BDF8;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap;
        }

        #log-raw-json {
            color: #4ADE80;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.3;
            margin: 0;
            white-space: pre;
        }

        .ticker-container {
            width: 100%;
            height: 75px; 
            background-color: #020617;
            border-top: 4px solid #475569; 
            margin-top: 10px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .ticker-title {
            background-color: #B91C1C; 
            color: #FFFFFF;
            font-size: 20px; 
            font-weight: bold;
            padding: 0 35px;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            z-index: 10;
            border-right: 4px solid #475569;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .ticker-text-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; 
            animation: ticker-move 32s linear infinite; 
            font-size: 24px; 
            color: #F8FAFC;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        @keyframes ticker-move {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>北海道&nbsp;&nbsp;道路交通情報</h1>
        <p id="status-text">● 24Hセキュア・ローカル配信管制中</p>
    </div>

    <div class="main-dashboard-layout">
        
        <div class="board-container info-left">
            <p class="board-title"><span>🚨 管制経路内 運行規制情報情報板</span><span id="live-clock-tag" style="color: #A5F3FC; font-size:13px; font-weight: bold;">（同期中）</span></p>
            
            <div class="board-content-wrapper">
                <div id="fixed-danger-zone"></div>
                
                <div id="scroll-outer-box">
                    <div id="scroll-inner-container">
                        <div class="no-alert" style="color: #64748B;">⚡ 道路交通情報を読み込んでいます...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="board-container stream-right">
            <div class="log-half-box">
                <p style="color: #38BDF8; font-size: 13px; font-weight: bold; margin: 0 0 6px 0;">📡 ① 内部ファイル同期ログ</p>
                <pre id="log-live-communication" class="log-scroll-area">初期化中...</pre>
            </div>
            <div class="log-half-box">
                <p style="color: #4ADE80; font-size: 13px; font-weight: bold; margin: 6px 0 6px 0;">💾 ② 読み込んだ生のJARTICデータ（JSON）</p>
                <div id="log-json-outer-box" class="log-scroll-area" style="overflow: hidden;">
                    <div id="log-raw-json-container">
                        <pre id="log-raw-json">（データ待機中...）</pre>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="ticker-container">
        <div class="ticker-title">道路ニュース速報</div>
        <div class="ticker-text-wrapper">
            <div id="live-ticker-text" class="ticker-text">北海道地方道路交通情報を24時間リアルタイム巡航中。</div>
        </div>
    </div>

    <script>
        let scrollTimer = null; 
        let jsonScrollTimer = null; 
        const commLogBox = document.getElementById("log-live-communication");
        const jsonBackupBox = document.getElementById("log-raw-json");

        function writeCommLog(message) {
            const now = new Date();
            const timestamp = `[${now.toLocaleTimeString()}] `;
            commLogBox.innerText += "\n" + timestamp + message;
            commLogBox.scrollTop = commLogBox.scrollHeight;
        }

        function checkHokkaidoTrafficTextOnly() {
            writeCommLog("=== セキュア同期確認スタート ===");
            writeCommLog("[1/1] GitHubサーバー内の data.json の読み込みを開始...");

            const jsonUrl = `./data.json?t=${new Date().getTime()}`;

            fetch(jsonUrl)
                .then(response => {
                    if (!response.ok) throw new Error("data.jsonが見つかりません。");
                    return response.json();
                })
                .then(jsonData => {
                    writeCommLog("=== 🟢 新しいジェイソンデータを解析します ===");
                    jsonBackupBox.innerText = JSON.stringify(jsonData, null, 2);
                    
                    updateControlBoard(jsonData);
                    startRightLogJsonScroll();
                })
                .catch(error => {
                    writeCommLog(`❌ エラー発生: ${error.toString()}`);
                });
        }

                "樽前", "樽前SA", "野幌PA", "比布PA", "有珠山SA", "本輪西", "本輪西PA", "富浦", "富浦PA", "美沢PA", "茶志内SA", "砂川SA", "音江連山PA",
