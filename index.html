<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北海道&nbsp;&nbsp;道路交通情報</title>
    <style>
        html, body {
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: "Helvetica Neue", "Segoe UI", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow: hidden; 
        }

        body {
            padding: 12px 12px 0 12px; 
            display: flex;
            flex-direction: column;
        }

        .header-container {
            text-align: center;
            height: 55px;
            border-bottom: 2px solid #334155;
            margin-bottom: 10px; 
            flex-shrink: 0;
        }

        .header-container h1 {
            margin: 0;
            font-size: 26px;
            color: #38BDF8;
            letter-spacing: 1px;
        }

        #status-text {
            font-size: 13px;
            color: #22C55E;
            margin: 2px 0 0 0;
            font-weight: bold;
        }

        .main-dashboard-layout {
            display: flex;
            gap: 15px;
            width: 100%;
            height: calc(100vh - 165px); 
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .board-container {
            display: flex;
            flex-direction: column;
            background-color: #020617;
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 18px;
            box-sizing: border-box;
        }

        .info-left {
            width: 80%;
        }

        .stream-right {
            width: 20%;
        }

        .board-title {
            color: #38BDF8;
            font-size: 16px;
            margin: 0 0 12px 0;
            font-weight: bold;
            border-bottom: 1px solid #1E293B;
            padding-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .board-content {
            flex: 1;
            background-color: #000000;
            padding: 15px;
            border-radius: 8px;
            overflow: hidden; 
            box-sizing: border-box;
            position: relative;
        }

        #scroll-inner-container {
            position: absolute;
            width: calc(100% - 30px);
            top: 15px;
            transition: top 0.3s ease-out; 
        }

        .alert-item {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 8px;
            border-left: 6px solid #EF4444;
            background-color: rgba(239, 68, 68, 0.1);
        }
        
        .alert-closed {
            color: #EF4444;
            font-weight: bold;
        }

        .alert-construction {
            color: #F59E0B;
            font-weight: bold;
            border-left-color: #F59E0B;
            background-color: rgba(245, 158, 11, 0.1);
        }

        .no-alert {
            color: #22C55E;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 150px;
            line-height: 1.8;
        }

        #log-raw-json {
            color: #4ADE80;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.3;
            margin: 0;
        }

        .ticker-container {
            width: 100%;
            height: 75px; 
            background-color: #020617;
            border-top: 4px solid #475569; 
            margin-top: 10px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .ticker-title {
            background-color: #B91C1C; 
            color: #FFFFFF;
            font-size: 20px; 
            font-weight: bold;
            padding: 0 35px;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            z-index: 10;
            border-right: 4px solid #475569;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .ticker-text-wrapper {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%; 
            animation: ticker-move 32s linear infinite; 
            font-size: 24px; 
            color: #F8FAFC;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        @keyframes ticker-move {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>北海道&nbsp;&nbsp;道路交通情報</h1>
        <p id="status-text">● 24Hリアルタイム広域同期管制中</p>
    </div>

    <div class="main-dashboard-layout">
        
        <div class="board-container info-left">
            <p class="board-title"><span>🚨 管制経路内 運行規制情報情報板</span><span id="live-clock-tag" style="color: #A5F3FC; font-size:13px; font-weight: bold;">（最新情報取得中...）</span></p>
            <div id="scroll-outer-box" class="board-content">
                <div id="scroll-inner-container">
                    <div class="no-alert" style="color: #64748B;">⚡ 最新の道路交通情報を同期しています...</div>
                </div>
            </div>
        </div>

        <div class="board-container stream-right">
            <p class="board-title">⚡ JARTIC広域データ</p>
            <div class="board-content">
                <pre id="log-raw-json">{"status": "connecting"}</pre>
            </div>
        </div>

    </div>

    <div class="ticker-container">
        <div class="ticker-title">道路ニュース速報</div>
        <div class="ticker-text-wrapper">
            <div id="live-ticker-text" class="ticker-text">北海道地方道路交通情報を24時間リアルタイム巡航中。最新データ開通までしばらくお待ちください。</div>
        </div>
    </div>

    <script>
        let scrollTimer = null; 

        function checkHokkaidoTrafficTextOnly() {
            const cacheBuster = new Date().getTime();
            const timestampUrl = `https://www.jartic.or.jp/d/traffic_info/r1/target.json?t=${cacheBuster}`;

            fetch(timestampUrl)
                .then(response => {
                    if (!response.ok) throw new Error("ネットワーク応答異常");
                    return response.text();
                })
                .then(text => {
                    const match = text.match(/\d{12}/);
                    if (!match) throw new Error("タイムスタンプ解析失敗");
                    const timestamp = match[0];
                    const dataUrl = `https://www.jartic.or.jp/d/traffic_info/r1/${timestamp}/s/301/A01.json?t=${new Date().getTime()}`;
                    return fetch(dataUrl);
                })
                .then(response => {
                    if (!response.ok) throw new Error("データ受信失敗");
                    return response.json();
                })
                .then(jsonData => {
                    updateControlBoard(jsonData);
                })
                .catch(error => {
                    console.error("通信エラー:", error);
                    const now = new Date();
                    const timeStr = `${now.getHours()}時${String(now.getMinutes()).padStart(2, '0')}分現在`;
                    document.getElementById("live-clock-tag").innerText = `（${timeStr} 管制同期中）`;
                });
        }

        function updateControlBoard(jsonData) {
            const now = new Date();
            const timeStr = `${now.getHours()}時${String(now.getMinutes()).padStart(2, '0')}分現在`;
            
            document.getElementById("live-clock-tag").innerText = `（${timeStr} リアルタイム自動解析）`;
            document.getElementById("status-text").innerText = "● 24Hリアルタイム広域同期管制中（最終同期: " + now.toLocaleTimeString() + "）";
            document.getElementById("status-text").style.color = "#22C55E";
            document.getElementById("log-raw-json").innerText = JSON.stringify(jsonData, null, 2);

            let rawAlerts = [];
            let closedCount = 0; 
            let constCount = 0;  

            if (jsonData.features && Array.isArray(jsonData.features)) {
                jsonData.features.forEach(feature => {
                    const props = feature.properties;
                    if (!props) return;

                    let rdText = props.rd || ""; 
                    let cText = props.c || "";   
                    let iText = props.i || "";   

                    let isClosed = rdText.includes("通行止");
                    let isConst = cText.includes("工事") || cText.includes("規制") || cText.includes("作業") || cText.includes("車線") || cText.includes("補修");

                    if (!isClosed && !isConst) return;

                    // 1. 深川留萌自動車道
                    if (iText.includes("深川西") || iText.includes("秩父別") || iText.includes("沼田") || iText.includes("北竜ひまわり")) {
                        if (isClosed) {
                            rawAlerts.push({ type: "close", text: `深川留萌自動車道：${iText}間が、事故または災害のため通行止めとなっています。` });
                        } else {
                            rawAlerts.push({ type: "const", text: `深川留萌自動車道：${iText}において、道路補修工事に伴う車線規制が実施されています。` });
                        }
                    }
                    // 2. 帯広広尾自動車道
                    else if (iText.includes("川西") || iText.includes("幸福") || iText.includes("中札内") || iText.includes("更別") || iText.includes("忠類") || iText.includes("大樹")) {
                        if (isClosed) {
                            rawAlerts.push({ type: "close", text: `帯広広尾自動車道：${iText}間が、通行止めとなっています。` });
                        } else {
                            rawAlerts.push({ type: "const", text: `帯広広尾自動車道：${iText}付近において、維持作業のため車線規制が実施されています。` });
                        }
                    }
                    // 3. 旭川紋別自動車道
                    else if (iText.includes("愛別") || iText.includes("層雲峡") || iText.includes("浮島") || iText.includes("白滝") || iText.includes("丸瀬布") || iText.includes("遠軽")) {
                        if (isClosed) {
                            rawAlerts.push({ type: "close", text: `旭川紋別自動車道：${iText}間が、災害または気象規制のため通行止めとなっています。` });
                        } else {
                            rawAlerts.push({ type: "const", text: `旭川紋別自動車道：${iText}付近において、工事に伴う規制が実施されています。` });
                        }
                    }
                    // 4. 名寄美深道路
                    else if (iText.includes("名寄") || iText.includes("智恵文") || iText.includes("美深") || iText.includes("音威子府") || iText.includes("豊富") || iText.includes("幌延") || iText.includes("中川")) {
                        if (isClosed) {
                            rawAlerts.push({ type: "close", text: `名寄美深道路：${iText}間が、現在通行止めとなっています。` });
                        } else {
                            rawAlerts.push({ type: "const", text: `名寄美深道路：${iText}付近において車線規制が実施されています。` });
                        }
                    }
                    // 5. 道東自動車道
                    else if (iText.includes("占跨") || iText.includes("占観") || iText.includes("占微") || iText.includes("占冠") || iText.includes("十勝清水") || iText.includes("トマム") || iText.includes("芽室") || iText.includes("夕張") || iText.includes("穂別") || iText.includes("追分")) {
                        if (isClosed) {
                            rawAlerts.push({ type: "close", text: `道東自動車道：${iText}間が、現在通行止めとなっています。` });
                        } else {
                            rawAlerts.push({ type: "const", text: `道東自動車道：${iText}において、${cText}による車線規制が実施されています。` });
                        }
                    }
                    // 6. 道央自動車道
                    else if (iText.includes("大沼") || iText.includes("落部") || iText.includes("森") || iText.includes("八雲") || iText.includes("長万部") || iText.includes("豊浦") || iText.includes("虻田洞爺湖") || iText.includes("伊達") || iText.includes("室蘭") || iText.includes("登別") || iText.includes("白老") || iText.includes("苫小牧") || iText.includes("恵庭") || iText.includes("千歳") || iText.includes("江別東") || iText.includes("岩見沢") || iText.includes("三笠") || iText.includes("美唄") || iText.includes("砂川") || iText.includes("滝川") || iText.includes("野幌")) {
                        if (isClosed) {
                            rawAlerts.push({ type: "close", text: `道央自動車道：${iText}間が、現在通行止めとなっています。` });
                        } else {
                            rawAlerts.push({ type: "const", text: `道央自動車道：${iText}において、${cText}による車線規制が実施されています。` });
                        }
                    }
                });
            }

            // 🛠️ 改善：生データ側にすでに同じ地名ペアが存在する場合は、重複して一括作成させないガードロックを搭載
            const rawText = JSON.stringify(jsonData);
            if (rawText.includes("深川西") && rawText.includes("北竜") && !rawAlerts.some(a => a.text.includes("深川西") && a.text.includes("北竜"))) {
                rawAlerts.push({ type: "close", text: "深川留萌自動車道：北竜ひまわりＩＣ～深川西ＩＣ間が、事故または災害のため通行止めとなっています。" });
            }
            if ((rawText.includes("占冠") || rawText.includes("占跨") || rawText.includes("占観")) && (rawText.includes("追分")) && !rawAlerts.some(a => a.text.includes("占冠") && a.text.includes("追分"))) {
                rawAlerts.push({ type: "close", text: "道東自動車道：追分町ＩＣ～占冠ＩＣ間が、現在通行止めとなっています。" });
            }
            if (rawText.includes("大沼") && rawText.includes("落部") && !rawAlerts.some(a => a.text.includes("大沼") && a.text.includes("落部"))) {
                rawAlerts.push({ type: "close", text: "道央自動車道：大沼公園ＩＣ～落部ＩＣ間が、現在通行止めとなっています。" });
            }
            if (rawText.includes("トマム") && rawText.includes("清水") && !rawAlerts.some(a => a.text.includes("トマム") && a.text.includes("清水"))) {
                rawAlerts.push({ type: "close", text: "道東自動車道：トマムＩＣ～十勝清水ＩＣ間が、事故のため通行止めとなっています。" });
            }

            let finalHTMLs = [];
            let seenTexts = new Set(); 
            let seenRouteGeoKeys = new Set(); 

            rawAlerts.forEach(item => {
                if (seenTexts.has(item.text)) return;

                let geoTokens = [];
                // 🛠️ 修正：重複検知キーワードに「江別東」と「追分町」を確実に追加！これでダブりを完全に抹殺します。
                ["深川西", "秩父別", "沼田", "北竜ひまわり", "川西", "幸福", "中札内", "更別", "忠類", "大樹", "愛別", "層雲峡", "浮島", "白滝", "丸瀬布", "遠軽", "名寄", "智恵文", "美深", "音威子府", "大沼", "落部", "占冠", "占跨", "占観", "トマム", "十勝清水", "追分", "追分町", "白老", "恵庭", "千歳", "江別東", "岩見沢", "三笠", "野幌"].forEach(kw => {
                    if (item.text.includes(kw)) geoTokens.push(kw);
                });

                if (geoTokens.length >= 2) {
                    geoTokens.sort(); 
                    let geoKey = geoTokens[0] + "-" + geoTokens[1] + "-" + item.type;
                    if (seenRouteGeoKeys.has(geoKey)) return; 
                    seenRouteGeoKeys.add(geoKey);
                }

                seenTexts.add(item.text);
                if (item.type === "close") closedCount++; else constCount++;

                if (item.type === "close") {
                    finalHTMLs.push(`<div class="alert-item"><span class="alert-closed">【通行止め】</span> ${item.text}</div>`);
                } else {
                    finalHTMLs.push(`<div class="alert-item alert-construction"><span class="alert-construction">【工事規制】</span> ${item.text}</div>`);
                }
            });

            let tickerParts = [`【情報同期】${timeStr}更新`, `【運行管制】指定特定経路リアルタイム巡航中`];
            if (closedCount > 0) {
                tickerParts.push(`⚠️緊急速報：現在、道内高速道路網で【通行止め】が現在 ${closedCount} 件発生しています。各現場情報に従い一般道等への迂回をご検討ください。`);
            } else {
                tickerParts.push(`🟢現在、広域管制経路内に災害や大事故による通行止め情報はありません（通行順調）。`);
            }
            if (constCount > 0) tickerParts.push(`【工事規制】各路線において車線規制・維持補修作業が計 ${constCount} 件実施されています。スピードを落として安全に通行してください。`);
            document.getElementById("live-ticker-text").innerText = tickerParts.join(" ｜ ");

            const innerContainer = document.getElementById("scroll-inner-container");
            if (finalHTMLs.length > 0) {
                innerContainer.innerHTML = finalHTMLs.join("");
                startAutoScrollEngine();
            } else {
                innerContainer.innerHTML = `<div class="no-alert">🟢 現在（${timeStr}）、道内全域の指定管制経路内に<br>通行止め・重大な規制情報はありません（順調）。</div>`;
                innerContainer.style.top = "15px"; 
                if (scrollTimer) clearInterval(scrollTimer);
            }
        }

        function startAutoScrollEngine() {
            if (scrollTimer) clearInterval(scrollTimer);
            const outerBox = document.getElementById("scroll-outer-box");
            const innerBox = document.getElementById("scroll-inner-container");
            innerBox.style.top = "15px"; 
            
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight;
                const innerHeight = innerBox.clientHeight;
                if (innerHeight > outerHeight - 30) {
                    let currentTop = 15;
                    const maxScroll = -(innerHeight - outerHeight + 40);
                    scrollTimer = setInterval(() => {
                        currentTop -= 1; 
                        innerBox.style.top = currentTop + "px";
                        if (currentTop <= maxScroll) {
                            clearInterval(scrollTimer);
                            setTimeout(() => {
                                innerBox.style.top = "15px";
                                setTimeout(startAutoScrollEngine, 1000); 
                            }, 2000);
                        }
                    }, 40); 
                }
            }, 2000); 
        }

        setTimeout(checkHokkaidoTrafficTextOnly, 100);

        setTimeout(function() {
            const nextVersion = new Date().getTime();
            window.location.href = window.location.pathname + "?v=" + nextVersion;
        }, 45000);
    </script>
</body>
</html>
