name: JARTICリアルタイム自動同期システム

on:
  schedule:
    - cron: '*/1 * * * *' # 1分ごとに24時間自動実行
  workflow_dispatch: # 手動起動ボタンも残す

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: 3つの最新データを同時に一括回収
      run: |
        # 1. JARTICの交通規制データを回収
        curl -s "https://www.jartic.or.jp/geo/v1/hokkaido/freeway/features.json" > data.json
        
        # 2. Yahoo!天気・災害（北海道・防災）を安全にサーバー側で回収
        curl -s "https://news.yahoo.co.jp/rss/topics/bousai.xml" > yahoo_weather.xml
        
        # 3. Yahoo!ニュース（国内・事故事件）を安全にサーバー側で回収
        curl -s "https://news.yahoo.co.jp/rss/topics/domestic.xml" > yahoo_news.xml

    - name: 最新データをGitHubリポジトリへ自動書き込み
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git status
        git add data.json yahoo_weather.xml yahoo_news.xml
        git commit -m "【自動管制】JARTIC・天気・事故ニュースの一括同期完了" || exit 0
        git push
