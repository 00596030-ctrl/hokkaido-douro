name: JARTICリアルタイム自動同期システム

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: 3つの最新データを同時に一括回収
      run: |
        # 1. JARTICの交通規制データを回収
        curl -s "https://www.jartic.or.jp/geo/v1/hokkaido/freeway/features.json" > data.json
        
        # 2. Yahoo!天気・災害（災害トピックス）を回収
        curl -s "https://news.yahoo.co.jp/rss/topics/bousai.xml" > yahoo_weather.xml
        
        # 3. Yahoo!ニュース（社会・事故事件専用チャンネル）へ完全切り替え！
        curl -s "https://news.yahoo.co.jp/rss/topics/shakai.xml" > yahoo_news.xml

    - name: 最新データをGitHubリポジトリへ自動書き込み
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git status
        git add data.json yahoo_weather.xml yahoo_news.xml
        git commit -m "【自動管制】ニュース仕入れ先を社会事故専用へ切り替え" || exit 0
        git push
