name: JARTICリアルタイム自動同期システム

on:
  schedule:
    - cron: '*/1 * * * *' # 1分ごとに24時間自動実行
  workflow_dispatch: # 手動起動ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: JARTICの交通規制データをクリーンに回収
      run: |
        curl -s "https://www.jartic.or.jp/geo/v1/hokkaido/freeway/features.json" > data.json

    - name: 最新データをGitHubリポジトリへ自動書き込み
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git status
        git add data.json
        git commit -m "【自動管制】ヤフー完全排除・JARTIC単独の安全ルートへ復旧" || exit 0
        git push
